<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@100;200;300;400;500;600;700;800;900&display=swap"

    />

    <link rel="stylesheet" href="./css/styles.css" />

    <title>Contacto</title>
  </head>
  <body>
    <header>
      <div class="div-logo"><a class="logo" href="../index.html">KIWI</a></div>
      <nav class="header-nav">
        <ul>
          <li>
            <a href="../index.html">Volver al inicio</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="titulo-contacto text-secondary">Contacto</h1>
      <!-- modify this form HTML and place wherever you want your form -->
      <form
        class="form-contacto"
        action="https://formspree.io/f/xykvggpq"
        method="POST"
      >
        <div class="grupo-input">
          <label for="email"> Tu email:</label>
          <input id="email" type="email" name="email" />
        </div>
        <div class="grupo-input">
          <label for="mensaje">Tu memsaje:</label>
          <textarea id="mensaje" name="message"></textarea>
        </div>
        <!-- your other form fields go here -->
        <button class="btn bg-secondary text-dark" type="submit">Send</button>
      </form>
    </main>
    <footer>
      <p>Sitio realizado por Isa Langer para Talento Tech</p>
      <nav>
        <ul class="footer-list">
          <li><img src="../img/whatsapp (2).png" alt="logo de whatsapp" /></li>
          <li>
            <img src="../img/instagram (1).png" alt="logo de instagram" />
          </li>
        </ul>
      </nav>
    </footer>
  </body>
